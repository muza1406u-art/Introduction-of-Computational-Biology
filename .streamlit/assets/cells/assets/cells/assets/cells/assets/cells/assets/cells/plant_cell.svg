  <text x="95" y="150" font-size="15" fill="#0f172a" font-family="Arial">cell membrane</text><text x="92" y="450" font-size="15" fill="#0f172a" font-family="Arial">cell wall</text><text x="116" y="282" font-size="15" fill="#0f172a" font-family="Arial">chloroplast</text><text x="132" y="335" font-size="15" fill="#0f172a" font-family="Arial">Golgi apparatus</text><text x="330" y="305" font-size="15" fill="#0f172a" font-family="Arial">vacuole</text><text x="535" y="212" font-size="15" fill="#0f172a" font-family="Arial">nucleus</text><text x="606" y="337" font-size="15" fill="#0f172a" font-family="Arial">mitochondrion</text><text x="590" y="170" font-size="15" fill="#0f172a" font-family="Arial">endoplasmic reticulum</text><text x="655" y="390" font-size="15" fill="#0f172a" font-family="Arial">ribosomes</text><text x="585" y="285" font-size="15" fill="#0f172a" font-family="Arial">cytoplasm</text>
