<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560" role="img" aria-label="Plant Cell Diagram">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.22"/></filter>
    <radialGradient id="glow" cx="35%" cy="25%"><stop offset="0" stop-color="#ffffff" stop-opacity="0.85"/><stop offset="1" stop-color="#ffffff" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="900" height="560" rx="32" fill="#f0fdf4"/>
  <text x="40" y="58" font-size="34" font-weight="800" fill="#0f172a" font-family="Arial">Plant Cell Diagram</text>
  <text x="42" y="90" font-size="18" fill="#334155" font-family="Arial">Reference photo/diagram for the Plant Cell class</text>
  
  <rect x="220" y="120" width="430" height="330" rx="40" fill="#65a30d" filter="url(#shadow)"/>
  <rect x="245" y="145" width="380" height="280" rx="32" fill="#bbf7d0"/>
